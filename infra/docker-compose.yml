services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-health-cabin-postgres
    environment:
      POSTGRES_DB: smart_health_cabin
      POSTGRES_USER: smart_health_cabin
      POSTGRES_PASSWORD: smart_health_cabin_dev
    ports:
      - "5432:5432"
    volumes:
      - smart_health_cabin_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_health_cabin -d smart_health_cabin"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    container_name: smart-health-cabin-redpanda
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr
      - internal://redpanda:29092,external://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - smart_health_cabin_redpanda:/var/lib/redpanda/data

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.7.2
    container_name: smart-health-cabin-redpanda-console
    depends_on:
      - redpanda
    environment:
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "8080:8080"

volumes:
  smart_health_cabin_pgdata:
  smart_health_cabin_redpanda:
